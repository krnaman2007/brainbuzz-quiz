<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1 id="quiz-app">🧠 BrainBuzz</h1>
      <div id="quiz-container">
        <progress id="question-progress-bar" value="0" max="100" class="hidden"></progress>
        <div id="question-container" class="hidden">
          <div id="ques">
            <h2 id="question-no"></h2>
            <h2 id="question-score"></h2>
          </div>
          <h2 id="question-text"></h2>
          <div id="timer"></div>
          <ul id="choices-list">
            <!-- Choices will be added dynamically here -->
          </ul>
          <button id="next-btn" class="hidden">Next Question</button>
          <button id="finish-btn" class="hidden">Finish Quiz</button>
        </div>
        <div id="result-container" class="hidden">
          <h2 id="score-heading">Your Score:</h2>
          <p id="score"></p>
          <p id="total-time"></p>
          <p id="performance-message"></p>
          <button id="review-btn">Review Performance</button>
          <div id="review-container" class="hidden"></div>
          <button id="back" class="hidden">Go to performance report</button>
          <button id="restart-btn">Restart Quiz</button>
        </div>
        <ul id="category-options">
          <li>😄 Easy</li>
          <li>😐 Medium</li>
          <li>😵 Hard</li>
        </ul>
        <p id="start-confirm" class="hidden"></p>
        <button id="start-btn">Start Quiz</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
